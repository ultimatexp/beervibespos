<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS on LINE LIFF</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body data-page="pos">
  <main class="shell">
    <section class="panel product-panel">
      <div class="section-head">
        <h2>สินค้า</h2>
        <button id="reload-products" class="ghost-button" type="button">โหลดใหม่</button>
      </div>
      <div class="db-status-bar" aria-live="polite">
        <div class="db-status-copy">
          <span id="db-status-dot" class="db-status-dot db-status-pending"></span>
          <span id="db-status-text">กำลังตรวจสอบฐานข้อมูล...</span>
        </div>
        <button id="test-db-connection" class="icon-button" type="button" aria-label="ทดสอบการเชื่อมต่อฐานข้อมูล" title="ทดสอบการเชื่อมต่อฐานข้อมูล">↻</button>
      </div>
      <div id="product-list" class="product-list"></div>
    </section>

    <section class="panel sale-panel">
        <h2>สรุปรายการขาย</h2>
        <form id="sale-form" class="stack">
          <div id="cart-list" class="cart-list"></div>

          <div class="summary-box">
            <div class="summary-row">
              <span>จำนวนรวม</span>
              <strong id="total-qty">0</strong>
            </div>
            <div class="summary-row total">
              <span>ยอดรวม</span>
              <strong id="grand-total">0.00 บาท</strong>
            </div>
          </div>

          <button id="submit-sale" class="primary-button confirm-button" type="submit">ยืนยัน</button>
          <p id="sale-message" class="feedback" aria-live="polite"></p>
        </form>
    </section>

    <header class="hero compact-hero top-shell">
      <div>
        <p class="eyebrow">LINE LIFF POS</p>
        <h1>ขายสินค้า</h1>
      </div>
      <div class="top-shell-actions">
        <nav class="topnav">
          <a class="navlink active" href="./index.html">ขายสินค้า</a>
          <a class="navlink" href="./stock.html">สต๊อก</a>
        </nav>
        <div class="seller-chip" aria-label="สถานะการเชื่อมต่อ LINE">
          <span id="profile-status-dot" class="status-dot status-pending"></span>
          <img id="profile-image" class="avatar" alt="LINE profile">
        </div>
      </div>
      <p id="profile-status" class="sr-only" aria-live="polite">กำลังเชื่อมต่อ LINE...</p>
    </header>
  </main>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="./config.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
